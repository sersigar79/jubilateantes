<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jubílate Antes – Estilo Apple</title>
  <link href="styles.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header class="header">
  <div class="logo">Jubílate Antes</div>
</header>

<section class="hero">
  <div class="hero-content">
    <h1>Tu libertad tiene fecha.</h1>
    <p>Descubre cuánto dinero necesitas para jubilarte a la edad que deseas.</p>
    <button onclick="scrollToForm()" class="btn-primary">Calcular mi libertad</button>
  </div>

  <img class="hero-img" 
       src="https://images.unsplash.com/photo-1521737604893-0f3c6a4ca0f3"
       alt="Empleado cansado en reunión con jefe enfadado">
</section>

<section id="form" class="form-section">
  <h2>Tu situación actual</h2>

  <div class="form-grid">

    <label>Edad actual
      <input type="number" id="edadActual" value="40">
    </label>

    <label>Edad objetivo de jubilación
      <input type="number" id="edadObjetivo" value="60">
    </label>

    <label>Dinero ahorrado (€)
      <input type="number" id="capitalActual" value="50000">
    </label>

  </div>

  <button class="btn-primary" onclick="calcular()">Calcular</button>
</section>

<section id="resultados" class="result-section">
  <h2>Resultado</h2>

  <p id="resultadoTexto"></p>
  <p id="subResultado"></p>

  <canvas id="grafica"></canvas>

  <h3>Cómo puedes llegar antes</h3>
  <ul id="accionesLista"></ul>
</section>

<footer class="footer">
  <p>Jubílate Antes © 2026</p>
</footer>

<script src="main.js"></script>
</body>
</html>
